Screens:
  ScreenAdmin:
    Properties:
      Fill: =ColorNavy
      OnVisible: =true
    Children:
      - rctHeaderBgAdmin:
          Control: Rectangle
          Properties:
            Fill: =ColorNavyDeep
            Height: =112
            Width: =Parent.Width
      - rctGoldRuleAdmin:
          Control: Rectangle
          Properties:
            Fill: =ColorGold
            Height: =4
            Width: =Parent.Width
            Y: =112
      - btnBackAdmin:
          Control: Button
          Properties:
            Align: =Align.Left
            Appearance: ='ButtonCanvas.Appearance'.Transparent
            BorderThickness: =0
            Font: =Font.'Segoe UI'
            FontColor: =ColorGold
            FontSize: =14
            FontWeight: =FontWeight.Semibold
            Height: =36
            Icon: ="ChevronLeft"
            IconStyle: ='ButtonCanvas.IconStyle'.Filled
            Layout: ='ButtonCanvas.Layout'.IconBefore
            OnSelect: =Navigate(ScreenHome, ScreenTransition.Fade)
            Text: ="BACK"
            Width: =120
            X: =32
            Y: =40
      - lblAdminTitle:
          Control: ModernText
          Properties:
            Color: =ColorTextPrimary
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =44
            Size: =24
            Text: ="ADMIN - MANAGE PRODUCTS & LINKS"
            Width: =Parent.Width - 224
            Wrap: =false
            X: =176
            Y: =32
      - lblAdminSubtitle:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =12
            Text: ="ADD, EDIT, OR REMOVE PRODUCTS AND THEIR LINKS"
            Width: =Parent.Width - 224
            X: =176
            Y: =80
      - cmbSectionFilterAdmin:
          Control: ModernCombobox
          Properties:
            Appearance: =Appearance.Outline
            BorderColor: =ColorGoldMuted
            BorderThickness: =1
            Color: =ColorTextPrimary
            Fill: =ColorNavySurface
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =44
            InputTextPlaceholder: ="FILTER BY SECTION (ALL)"
            IsSearchable: =true
            ItemDisplayText: =ThisItem.arng_name
            Items: =SortByColumns(Filter(arng_StaffSections, statecode = 'Status (arng_StaffSections)'.Active), "arng_displayorder", SortOrder.Ascending)
            SelectMultiple: =false
            Size: =14
            Width: =360
            X: =48
            Y: =148
      - btnAddProductAdmin:
          Control: Button
          Properties:
            Align: =Align.Center
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BasePaletteColor: =ColorGold
            BorderRadius: =2
            Font: =Font.'Segoe UI'
            FontColor: =ColorNavyDeep
            FontSize: =13
            FontWeight: =FontWeight.Semibold
            Height: =44
            Icon: ="Add"
            IconStyle: ='ButtonCanvas.IconStyle'.Filled
            Layout: ='ButtonCanvas.Layout'.IconBefore
            OnSelect: |-
              =Set(editMode, "new");
              Set(editProduct, Defaults(arng_Products));
              Navigate(ScreenProductForm, ScreenTransition.Fade)
            Text: ="ADD PRODUCT"
            Width: =180
            X: =Parent.Width - 228
            Y: =148
      - galAdminProducts:
          Control: Gallery
          Variant: Vertical
          Properties:
            Fill: =RGBA(0,0,0,0)
            Height: =Parent.Height - Self.Y - 32
            Items: |-
              =SortByColumns(
                  Filter(
                    arng_Products,
                    (IsBlank(cmbSectionFilterAdmin.Selected) || arng_SectionId.arng_staffsectionid = cmbSectionFilterAdmin.Selected.arng_staffsectionid),
                    statecode = 'Status (arng_Products)'.Active
                  ),
                  "arng_name",
                  SortOrder.Ascending
                )
            TemplatePadding: =8
            TemplateSize: =104
            Width: =Parent.Width - 96
            X: =48
            Y: =212
          Children:
            - rctAdminRow:
                Control: Rectangle
                Properties:
                  BorderColor: =ColorGoldMuted
                  BorderThickness: =1
                  Fill: =ColorNavySurface
                  Height: =Parent.TemplateHeight - 16
                  Width: =Parent.TemplateWidth
            - rctAdminRowAccent:
                Control: Rectangle
                Properties:
                  Fill: =ColorGold
                  Height: =Parent.TemplateHeight - 16
                  Width: =6
            - lblAdminProdName:
                Control: ModernText
                Properties:
                  Color: =ColorTextPrimary
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =28
                  Size: =16
                  Text: =ThisItem.arng_name
                  Width: =380
                  Wrap: =false
                  X: =28
                  Y: =14
            - lblAdminProdSection:
                Control: ModernText
                Properties:
                  Color: =ColorGold
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =20
                  Size: =11
                  Text: '="SECTION: " & Upper(ThisItem.arng_SectionId.arng_name)'
                  Width: =380
                  X: =28
                  Y: =44
            - lblAdminProdLinkCount:
                Control: ModernText
                Properties:
                  Color: =ColorTextSecondary
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Height: =18
                  Size: =11
                  Text: |-
                    =CountRows(
                        Filter(arng_ProductLinks,
                          arng_ProductId.arng_productid = ThisItem.arng_productid,
                          statecode = 'Status (arng_ProductLinks)'.Active
                        )
                      ) & " LINKS"
                  Width: =200
                  X: =28
                  Y: =66
            - btnAdminEdit:
                Control: Button
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Outline
                  BasePaletteColor: =ColorGold
                  BorderRadius: =2
                  Font: =Font.'Segoe UI'
                  FontColor: =ColorGold
                  FontSize: =12
                  FontWeight: =FontWeight.Semibold
                  Height: =40
                  Icon: ="Edit"
                  IconStyle: ='ButtonCanvas.IconStyle'.Filled
                  Layout: ='ButtonCanvas.Layout'.IconBefore
                  OnSelect: |-
                    =Set(editMode, "edit");
                    Set(editProduct, ThisItem);
                    Navigate(ScreenProductForm, ScreenTransition.Fade)
                  Text: ="EDIT"
                  Width: =110
                  X: =Parent.TemplateWidth - 400
                  Y: =(Parent.TemplateHeight - 16 - 40) / 2
            - btnAdminLinks:
                Control: Button
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Outline
                  BasePaletteColor: =ColorGold
                  BorderRadius: =2
                  Font: =Font.'Segoe UI'
                  FontColor: =ColorGold
                  FontSize: =12
                  FontWeight: =FontWeight.Semibold
                  Height: =40
                  Icon: ="Link"
                  IconStyle: ='ButtonCanvas.IconStyle'.Filled
                  Layout: ='ButtonCanvas.Layout'.IconBefore
                  OnSelect: |-
                    =Set(currentProduct, ThisItem);
                    Navigate(ScreenLinksAdmin, ScreenTransition.Fade)
                  Text: ="LINKS"
                  Width: =110
                  X: =Parent.TemplateWidth - 278
                  Y: =(Parent.TemplateHeight - 16 - 40) / 2
            - btnAdminDelete:
                Control: Button
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Outline
                  BasePaletteColor: =RGBA(220, 80, 80, 1)
                  BorderRadius: =2
                  Font: =Font.'Segoe UI'
                  FontColor: =RGBA(220, 80, 80, 1)
                  FontSize: =12
                  FontWeight: =FontWeight.Semibold
                  Height: =40
                  Icon: ="Delete"
                  IconStyle: ='ButtonCanvas.IconStyle'.Filled
                  Layout: ='ButtonCanvas.Layout'.IconBefore
                  OnSelect: =Remove(arng_Products, ThisItem)
                  Text: ="DELETE"
                  Width: =110
                  X: =Parent.TemplateWidth - 156
                  Y: =(Parent.TemplateHeight - 16 - 40) / 2
