Screens:
  ScreenLinksAdmin:
    Properties:
      Fill: =ColorNavy
      OnVisible: =true
    Children:
      - rctHeaderBgLinksAdmin:
          Control: Rectangle
          Properties:
            Fill: =ColorNavyDeep
            Height: =112
            Width: =Parent.Width
      - rctGoldRuleLinksAdmin:
          Control: Rectangle
          Properties:
            Fill: =ColorGold
            Height: =4
            Width: =Parent.Width
            Y: =112
      - btnBackLinksAdmin:
          Control: Button
          Properties:
            Align: =Align.Left
            Appearance: ='ButtonCanvas.Appearance'.Transparent
            BorderThickness: =0
            Font: =Font.'Segoe UI'
            FontColor: =ColorGold
            FontSize: =14
            FontWeight: =FontWeight.Semibold
            Height: =36
            Icon: ="ChevronLeft"
            IconStyle: ='ButtonCanvas.IconStyle'.Filled
            Layout: ='ButtonCanvas.Layout'.IconBefore
            OnSelect: =Navigate(ScreenAdmin, ScreenTransition.Fade)
            Text: ="BACK"
            Width: =120
            X: =32
            Y: =40
      - lblLinksAdminTitle:
          Control: ModernText
          Properties:
            Color: =ColorTextPrimary
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =44
            Size: =24
            Text: ="LINKS - " & If(IsBlank(currentProduct), "", Upper(currentProduct.arng_name))
            Width: =Parent.Width - 224
            Wrap: =false
            X: =176
            Y: =32
      - lblLinksAdminSubtitle:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =12
            Text: ="MANAGE LINKS FOR THIS PRODUCT"
            Width: =Parent.Width - 224
            X: =176
            Y: =80
      - btnAddLinkLinksAdmin:
          Control: Button
          Properties:
            Align: =Align.Center
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BasePaletteColor: =ColorGold
            BorderRadius: =2
            Font: =Font.'Segoe UI'
            FontColor: =ColorNavyDeep
            FontSize: =13
            FontWeight: =FontWeight.Semibold
            Height: =44
            Icon: ="Add"
            IconStyle: ='ButtonCanvas.IconStyle'.Filled
            Layout: ='ButtonCanvas.Layout'.IconBefore
            OnSelect: |-
              =Set(editMode, "new");
              Set(editLink, Defaults(arng_ProductLinks));
              Navigate(ScreenLinkForm, ScreenTransition.Fade)
            Text: ="ADD LINK"
            Width: =160
            X: =Parent.Width - 208
            Y: =148
      - galAdminLinks:
          Control: Gallery
          Variant: Vertical
          Properties:
            Fill: =RGBA(0,0,0,0)
            Height: =Parent.Height - Self.Y - 32
            Items: |-
              =SortByColumns(
                  Filter(arng_ProductLinks,
                    arng_ProductId.arng_productid = currentProduct.arng_productid,
                    statecode = 'Status (arng_ProductLinks)'.Active
                  ),
                  "arng_displayorder",
                  SortOrder.Ascending
                )
            TemplatePadding: =8
            TemplateSize: =104
            Width: =Parent.Width - 96
            X: =48
            Y: =212
          Children:
            - rctAdminLinkRow:
                Control: Rectangle
                Properties:
                  BorderColor: =ColorGoldMuted
                  BorderThickness: =1
                  Fill: =ColorNavySurface
                  Height: =Parent.TemplateHeight - 16
                  Width: =Parent.TemplateWidth
            - rctAdminLinkRowAccent:
                Control: Rectangle
                Properties:
                  Fill: =ColorGold
                  Height: =Parent.TemplateHeight - 16
                  Width: =6
            - lblAdminLinkName:
                Control: ModernText
                Properties:
                  Color: =ColorTextPrimary
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =26
                  Size: =16
                  Text: =ThisItem.arng_name
                  Width: =500
                  Wrap: =false
                  X: =28
                  Y: =12
            - lblAdminLinkType:
                Control: ModernText
                Properties:
                  Color: =ColorGold
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Semibold
                  Height: =18
                  Size: =11
                  Text: |-
                    =Switch(ThisItem.arng_linktype,
                        'LinkType (arng_ProductLinks)'.DASHBOARD, "DASHBOARD",
                        'LinkType (arng_ProductLinks)'.MODEL_DRIVEN_APP, "MODEL-DRIVEN APP",
                        'LinkType (arng_ProductLinks)'.CANVAS_APP, "CANVAS APP",
                        ""
                      )
                  Width: =200
                  X: =28
                  Y: =40
            - lblAdminLinkUrl:
                Control: ModernText
                Properties:
                  Color: =ColorTextSecondary
                  Font: =Font.'Segoe UI'
                  FontWeight: =FontWeight.Normal
                  Height: =18
                  Size: =11
                  Text: =ThisItem.arng_url
                  Width: =520
                  Wrap: =false
                  X: =28
                  Y: =62
            - btnAdminLinkEdit:
                Control: Button
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Outline
                  BasePaletteColor: =ColorGold
                  BorderRadius: =2
                  Font: =Font.'Segoe UI'
                  FontColor: =ColorGold
                  FontSize: =12
                  FontWeight: =FontWeight.Semibold
                  Height: =40
                  Icon: ="Edit"
                  IconStyle: ='ButtonCanvas.IconStyle'.Filled
                  Layout: ='ButtonCanvas.Layout'.IconBefore
                  OnSelect: |-
                    =Set(editMode, "edit");
                    Set(editLink, ThisItem);
                    Navigate(ScreenLinkForm, ScreenTransition.Fade)
                  Text: ="EDIT"
                  Width: =110
                  X: =Parent.TemplateWidth - 278
                  Y: =(Parent.TemplateHeight - 16 - 40) / 2
            - btnAdminLinkDelete:
                Control: Button
                Properties:
                  Appearance: ='ButtonCanvas.Appearance'.Outline
                  BasePaletteColor: =RGBA(220, 80, 80, 1)
                  BorderRadius: =2
                  Font: =Font.'Segoe UI'
                  FontColor: =RGBA(220, 80, 80, 1)
                  FontSize: =12
                  FontWeight: =FontWeight.Semibold
                  Height: =40
                  Icon: ="Delete"
                  IconStyle: ='ButtonCanvas.IconStyle'.Filled
                  Layout: ='ButtonCanvas.Layout'.IconBefore
                  OnSelect: =Remove(arng_ProductLinks, ThisItem)
                  Text: ="DELETE"
                  Width: =110
                  X: =Parent.TemplateWidth - 156
                  Y: =(Parent.TemplateHeight - 16 - 40) / 2
