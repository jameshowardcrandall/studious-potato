Screens:
  ScreenLinkForm:
    Properties:
      Fill: =ColorNavy
      OnVisible: =true
    Children:
      - rctHeaderBgLinkForm:
          Control: Rectangle
          Properties:
            Fill: =ColorNavyDeep
            Height: =112
            Width: =Parent.Width
      - rctGoldRuleLinkForm:
          Control: Rectangle
          Properties:
            Fill: =ColorGold
            Height: =4
            Width: =Parent.Width
            Y: =112
      - btnBackLinkForm:
          Control: Button
          Properties:
            Align: =Align.Left
            Appearance: ='ButtonCanvas.Appearance'.Transparent
            BorderThickness: =0
            Font: =Font.'Segoe UI'
            FontColor: =ColorGold
            FontSize: =14
            FontWeight: =FontWeight.Semibold
            Height: =36
            Icon: ="Dismiss"
            IconStyle: ='ButtonCanvas.IconStyle'.Filled
            Layout: ='ButtonCanvas.Layout'.IconBefore
            OnSelect: =Navigate(ScreenLinksAdmin, ScreenTransition.Fade)
            Text: ="CANCEL"
            Width: =140
            X: =32
            Y: =40
      - lblFormTitleLink:
          Control: ModernText
          Properties:
            Color: =ColorTextPrimary
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Bold
            Height: =44
            Size: =24
            Text: =If(editMode = "new", "ADD LINK", "EDIT LINK")
            Width: =Parent.Width - 224
            Wrap: =false
            X: =176
            Y: =32
      - lblFormSubtitleLink:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =24
            Size: =12
            Text: ="LINK DETAILS"
            Width: =Parent.Width - 224
            X: =176
            Y: =80
      - lblFieldNameLink:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: ="NAME"
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =156
      - txtNameLink:
          Control: ModernTextInput
          Properties:
            Appearance: =Appearance.Outline
            BorderColor: =ColorGoldMuted
            BorderThickness: =1
            Color: =ColorTextPrimary
            Default: =Coalesce(editLink.arng_name, "")
            Fill: =ColorNavySurface
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =44
            Placeholder: ="Enter link name"
            Required: =true
            Size: =14
            Type: =TextInputType.SingleLine
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =180
      - lblFieldTypeLink:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: ="LINK TYPE"
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =244
      - cmbTypeLink:
          Control: ModernCombobox
          Properties:
            Appearance: =Appearance.Outline
            BorderColor: =ColorGoldMuted
            BorderThickness: =1
            Color: =ColorTextPrimary
            DefaultSelectedItems: |-
              =If(editMode = "edit" && !IsBlank(editLink.arng_linktype),
                  Filter(
                    Table(
                      { Value: "DASHBOARD", Type: 'LinkType (arng_ProductLinks)'.DASHBOARD },
                      { Value: "MODEL-DRIVEN APP", Type: 'LinkType (arng_ProductLinks)'.MODEL_DRIVEN_APP },
                      { Value: "CANVAS APP", Type: 'LinkType (arng_ProductLinks)'.CANVAS_APP }
                    ),
                    Type = editLink.arng_linktype
                  ),
                  Blank()
                )
            Fill: =ColorNavySurface
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =44
            InputTextPlaceholder: ="Select a link type"
            IsSearchable: =false
            ItemDisplayText: =ThisItem.Value
            Items: |-
              =Table(
                  { Value: "DASHBOARD", Type: 'LinkType (arng_ProductLinks)'.DASHBOARD },
                  { Value: "MODEL-DRIVEN APP", Type: 'LinkType (arng_ProductLinks)'.MODEL_DRIVEN_APP },
                  { Value: "CANVAS APP", Type: 'LinkType (arng_ProductLinks)'.CANVAS_APP }
                )
            SelectMultiple: =false
            Size: =14
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =268
      - lblFieldUrlLink:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: ="URL"
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =332
      - txtUrlLink:
          Control: ModernTextInput
          Properties:
            Appearance: =Appearance.Outline
            BorderColor: =ColorGoldMuted
            BorderThickness: =1
            Color: =ColorTextPrimary
            Default: =Coalesce(editLink.arng_url, "")
            Fill: =ColorNavySurface
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =44
            Placeholder: ="https://..."
            Required: =true
            Size: =14
            Type: =TextInputType.SingleLine
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =356
      - lblFieldOrderLink:
          Control: ModernText
          Properties:
            Color: =ColorGold
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Semibold
            Height: =20
            Size: =11
            Text: ="DISPLAY ORDER"
            Width: =720
            X: =(Parent.Width - 800) / 2 + 40
            Y: =420
      - txtOrderLink:
          Control: ModernTextInput
          Properties:
            Appearance: =Appearance.Outline
            BorderColor: =ColorGoldMuted
            BorderThickness: =1
            Color: =ColorTextPrimary
            Default: =Text(Coalesce(editLink.arng_displayorder, 0))
            Fill: =ColorNavySurface
            Font: =Font.'Segoe UI'
            FontWeight: =FontWeight.Normal
            Height: =44
            Placeholder: ="0"
            Size: =14
            Type: =TextInputType.SingleLine
            Width: =240
            X: =(Parent.Width - 800) / 2 + 40
            Y: =444
      - btnSaveLink:
          Control: Button
          Properties:
            Align: =Align.Center
            Appearance: ='ButtonCanvas.Appearance'.Primary
            BasePaletteColor: =ColorGold
            BorderRadius: =2
            Font: =Font.'Segoe UI'
            FontColor: =ColorNavyDeep
            FontSize: =14
            FontWeight: =FontWeight.Semibold
            Height: =48
            Icon: ="Save"
            IconStyle: ='ButtonCanvas.IconStyle'.Filled
            Layout: ='ButtonCanvas.Layout'.IconBefore
            OnSelect: |-
              =If(IsBlank(txtNameLink.Text) || IsBlank(cmbTypeLink.Selected) || IsBlank(txtUrlLink.Text),
                  Notify("Name, Link Type, and URL are required.", NotificationType.Error),
                  If(editMode = "new",
                    Patch(arng_ProductLinks,
                      Defaults(arng_ProductLinks),
                      {
                        arng_name: txtNameLink.Text,
                        arng_url: txtUrlLink.Text,
                        arng_linktype: cmbTypeLink.Selected.Type,
                        arng_displayorder: Value(txtOrderLink.Text),
                        arng_ProductId: currentProduct
                      }
                    ),
                    Patch(arng_ProductLinks,
                      editLink,
                      {
                        arng_name: txtNameLink.Text,
                        arng_url: txtUrlLink.Text,
                        arng_linktype: cmbTypeLink.Selected.Type,
                        arng_displayorder: Value(txtOrderLink.Text)
                      }
                    )
                  );
                  Navigate(ScreenLinksAdmin, ScreenTransition.Fade)
                )
            Text: ="SAVE"
            Width: =180
            X: =Parent.Width - 228
            Y: =Parent.Height - 80
